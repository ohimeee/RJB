<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link href="./output.css" rel="stylesheet" />
    <title>RJB Intro Page</title>
    <style>
      body {
        font-family: "Inter", system-ui, sans-serif;
      }

      .font-display {
        font-family: "Anton", Impact, sans-serif;
      }
    </style>
  </head>

  <body class="relative w-full h-screen overflow-hidden bg-black">
    <div
      id="welcome-container"
      class="absolute inset-0 flex items-center justify-center bg-black transition-all duration-700"
    >
      <div
        class="flex flex-col items-center"
      >
        <p class="mb-3 text-2xl font-medium tracking-widest text-zinc-400">WELCOME TO</p>
        <div class="font-display mb-10 flex gap-5 text-9xl">
          <span class="text-red-800 drop-shadow-[0_0_18px_rgba(127,29,29,0.55)]"> R </span>
          <span class="text-green-800 drop-shadow-[0_0_18px_rgba(6,95,70,0.55)]"> J </span>
          <span class="text-blue-800 drop-shadow-[0_0_18px_rgba(30,64,175,0.55)]"> B </span>
        </div>
        <button
          id="start-button"
          class="rounded-2xl border border-zinc-600 bg-zinc-900 px-12 py-4 text-2xl font-bold tracking-[0.3em] text-zinc-200 transition-all duration-300 hover:scale-105 hover:border-zinc-400 hover:bg-zinc-800 hover:shadow-[0_0_25px_rgba(255,255,255,0.12)] active:scale-95"
        >
          START
        </button>
      </div>
    </div>

    <div
      id="panel-container"
      class="absolute inset-0 -translate-y-full transition-all duration-700"
    >
      <div class="flex relative h-screen w-full">
        <!-- Left Panel -->
        <div
          id="recca-panel"
          class="relative group flex-1 overflow-hidden transition-all duration-700 "
        >
          <img
            id="recca-img"
            src="assets/left.jpg"
            class="h-full w-full object-cover transition-all duration-700 hover:brightness-70 hover:scale-110"
          />
          <p
            class="absolute inset-x-0 bottom-40 text-center text-red-600 text-6xl opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none"
          >
            Recca
          </p>
        </div>
        <div
          id="recca-info"
          class="relative flex-0 w-0 overflow-hidden bg-linear-to-b from-black via-red-950 to-red-950 transition-all duration-700"
        >
          <p class="text-5xl font-bold text-white text-center">Recca Lee Pendioday</p>
          <p class="whitespace-pre-line text-3xl text-white flex items-left justify-left pl-15">
            Age: 19 Birthday: 2004-01-30
          </p>
        </div>

        <!-- Center Panel -->
        <div
          id="johnmarc-panel"
          class="relative group flex-1 overflow-hidden transition-all duration-700 "
        >
          <img
            id="johnmarc-img"
            src="assets/center.jpg"
            class="h-full w-full object-cover transition-all duration-700 hover:brightness-70 hover:scale-110"
          />
          <p
            class="absolute inset-x-0 bottom-40 text-center text-green-600 text-6xl opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none"
          >
            Johnmarc
          </p>
        </div>
        <div
          id="johnmarc-info"
          class="relative flex-0 w-0 overflow-hidden bg-linear-to-b from-black via-green-950 to-green-950 transition-all duration-700"
        >
          <p class="text-5xl font-bold text-white text-center">Johnmarc Jayme</p>
          <p class="whitespace-pre-line text-3xl text-white flex items-left justify-left pl-15">
            Age: 19 Birthday: 2004-01-30
          </p>
        </div>

        <!-- Right Panel -->
        <div
          id="bryan-panel"
          class="relative group flex-1 overflow-hidden transition-all duration-700 "
        >
          <img
            id="bryan-img"
            src="assets/right.jpg"
            class="h-full w-full object-cover transition-all duration-700 hover:brightness-70 hover:scale-110"
          />
          <p
            class="absolute inset-x-0 bottom-40 text-center text-blue-600 text-6xl opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none"
          >
            Bryan
          </p>
        </div>
        <div
          id="bryan-info"
          class="relative flex-0 w-0 overflow-hidden bg-linear-to-b from-black via-blue-950 to-blue-950 transition-all duration-700"
        >
          <p class="text-5xl font-bold text-white text-center">Bryan Estoesta</p>
          <p class="whitespace-pre-line text-3xl text-white flex items-left justify-left pl-15">
            Age: 19 Birthday: 2004-01-30
          </p>
        </div>

        <div
          class="absolute inset-0 z-10 bg-linear-to-t from-black via-transparent to-transparent pointer-events-none"
        ></div>
      </div>
    </div>
  </body>
  <script src="index.js"></script>
</html>
