<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <title>RJB Intro Page</title>
  </head>
  <body class="min-h-screen bg-black">
    <div id="welcome-container" class="h-screen flex flex-col justify-center items-center font-semibold text-9xl bg-black opacity-100 transition-opacity duration-700">
      <p class="text-center text-white">Welcome to</p>
      <div class="flex font-bold justify-center gap-1">
        <p class="text-red-900">R</p>
        <p class="text-green-900">J</p>
        <p class="text-blue-900">B</p>
      </div>
      <button id="start-button" class="m-10 text-7xl rounded-4xl p-3 bg-white text-black">START</button>
    </div>
    
    <div id="panel-container" class="flex relative h-screen">
      <!-- Left Panel -->
      <div
        class="relative group flex flex-1 overflow-hidden transition-all duration-700 hover:flex-[1.15]"
      >
        <img
          id="recca-img"
          src="assets/left.jpg"
          class="h-full w-full object-cover transition-all duration-700 group-hover:brightness-70"
        />
        <p
        class="absolute inset-x-0 bottom-40 flex items-center justify-center text-red-600 text-6xl opacity-0 group-hover:opacity-100 transition-opacity duration-700"
        >
        Recca
      </p>
    </div>
    <!-- Center Panel -->
    <div class="relative group flex flex-1 overflow-hidden transition-all duration-700 hover:flex-[1.15]">
      <img
      id="johnmarc-img"
      src="assets/center.jpg"
      class="h-full w-full object-cover transition-all duration-700 group-hover:brightness-70"
      />
      <p
        class="absolute inset-x-0 bottom-40 flex items-center justify-center text-green-600 text-6xl opacity-0 group-hover:opacity-100 transition-opacity duration-700"
      >
        Johnmarc
        </p>
      </div>
      <!-- Right Panel -->
      <div class="relative group flex flex-1 overflow-hidden transition-all duration-700 hover:flex-[1.15]">
        <img
        id="bryan-img"
        src="assets/right.jpg"
        class="h-full w-full object-cover transition-all duration-700 group-hover:brightness-70"
        />
      <p
        class="absolute inset-x-0 bottom-40 flex items-center justify-center text-blue-600 text-6xl opacity-0 group-hover:opacity-100 transition-opacity duration-700"
      >
        Bryan
        </p>
      </div>
      <div
        class="absolute inset-0 z-10 bg-linear-to-t from-black via-transparent to-transparent pointer-events-none"
      ></div>
    </div>

    <div
      id="recca-info"
      class=" relative h-screen bg-linear-to-b from-black via-red-950 to-red-950"
    >
      <p id="name" class="text-5xl font-sfmono text-white text-center">Recca Lee Pendioday</p>
      <p
        id="info"
        class="whitespace-pre-line text-3xl text-white flex items-left justify-left pl-15"
      >
        Age: 19 Birthday: 2004-01-30
      </p>
    </div> 
  </body>
  <script src="index.js"></script>
</html>
