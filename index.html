<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <title>RJB Intro Page</title>
  </head>
  <body class="bg-black">
    <div class="flex h-screen">
      <div class="relative flex-1 overflow-hidden bg-red-900 [clip-path:polygon(0_0,100%_0,95%_100%,0_100%)]">
        <img
        src="assets/left.jpg"
          alt="Left Image"
          class="absolute bottom-0 h-full w-full object-cover"
        />
      </div>

      <div class="relative flex-1 overflow-hidden bg-green-900 [clip-path:polygon(5%_0,100%_0,95%_100%,0_100%)]">
        <img
          src="assets/center.jpg"
          alt="Center Image"
          class="absolute bottom-0 h-full w-full object-cover"
        />
      </div>

      <div class="relative flex-1 overflow-hidden bg-blue-900 [clip-path:polygon(5%_0,100%_0,100%_100%,0_100%)]">
        <img
          src="assets/right.jpg"
          alt="Right Image"
          class="absolute bottom-0 h-full w-full object-cover"
        />
      </div>
    </div>
  </body>
</html>
