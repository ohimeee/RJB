<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <title>RJB Intro Page</title>
  </head>
  <body class="bg-black">
    <div class="relative h-screen">
      <div class="flex h-full">
        <!-- Left Panel -->
        <div
          class="group flex flex-1 overflow-hidden transition-all duration-700 hover:flex-[1.15]"
        >
          <img src="assets/left.jpg" class="h-full w-full object-cover" />
        </div>
        <!-- Center Panel -->
        <div
          class="group flex flex-1 overflow-hidden transition-all duration-700 hover:flex-[1.15]"
        >
          <img src="assets/center.jpg" class="h-full w-full object-cover" />
        </div>
        <!-- Right Panel -->
        <div
          class="group flex flex-1 overflow-hidden transition-all duration-700 hover:flex-[1.15]"
        >
          <img src="assets/right.jpg" class="h-full w-full object-cover" />
        </div>
      </div>

      <div
        class="absolute inset-0 z-10 bg-linear-to-t from-gray-950 via-transparent to-transparent pointer-events-none"
      ></div>
      <div
        class="absolute inset-x-0 bottom-4 flex justify-center items-center z-20 pointer-events-none"
      >
        <p class="text-6xl font-bold text-center text-white">
          Welcome to <br />
          <span class="text-red-900">R</span>
          <span class="text-green-900">J</span>
          <span class="text-blue-900">B</span>
        </p>
      </div>
    </div>
  </body>
  <script src="index.js"></script>
</html>
