<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <title>RJB Intro Page</title>
  </head>
  <body class="min-h-screen bg-black">
    <div class="relative h-screen">
      <div class="flex h-full">
        <!-- Left Panel -->
        <div
          id="left-panel"
          class="group flex flex-1 overflow-hidden transition-all duration-700 hover:flex-[1.15]"
        >
          <img
            src="assets/left.jpg"
            class="h-full w-full object-cover transition-all duration-700 hover:brightness-130"
          />
        </div>
        <!-- Center Panel -->
        <div
          id="center-panel"
          class="group flex flex-1 overflow-hidden transition-all duration-700 hover:flex-[1.15]"
        >
          <img
            src="assets/center.jpg"
            class="h-full w-full object-cover transition-all duration-700 hover:brightness-130"
          />
        </div>
        <!-- Right Panel -->
        <div
          id="right-panel"
          class="group flex flex-1 overflow-hidden transition-all duration-700 hover:flex-[1.15]"
        >
          <img
            src="assets/right.jpg"
            class="h-full w-full object-cover transition-all duration-700 hover:brightness-130"
          />
        </div>
      </div>

      <div
        class="absolute inset-0 z-10 bg-linear-to-t from-black via-transparent to-transparent pointer-events-none"
      ></div>
      <div class="absolute inset-x-0 bottom-4 text-6xl font-bold z-20 pointer-events-none">
        <p class="text-center text-white">Welcome to</p>
        <div class="flex justify-center gap-1">
          <p class="text-red-900">R</p>
          <p class="text-green-900">J</p>
          <p class="text-blue-900">B</p>
        </div>
      </div>

      <div id="recca-info" class="hidden relative h-screen bg-red-950 transiton-all duration-700">
        <div
          class="absolute inset-0 z-10 bg-linear-to-b from-black via-transparent to-transparent pointer-events-none"
        >
          <p id="name" class="text-5xl font-sfmono text-white text-center">Recca Lee Pendioday</p>
          <p
            id="info"
            class="whitespace-pre-line text-3xl text-white flex items-left justify-left pl-15"
          >
            Age: 19 Birthday: 2004-01-30
          </p>
        </div>
      </div>

      <div id="johnmarc-info" class="hidden relative h-screen bg-green-950 transiton-all duration-700">
        <div
          class="absolute inset-0 z-10 bg-linear-to-b from-black via-transparent to-transparent pointer-events-none"
        >
          <p id="name" class="text-5xl font-sfmono text-white text-center">Johnmarc Jayme</p>
          <p
            id="info"
            class="whitespace-pre-line text-3xl text-white flex items-left justify-left pl-15"
          >
            Age: 19 Birthday: 2004-01-30
          </p>
        </div>
      </div>

      <div id="bryan-info" class="hidden relative h-screen bg-blue-950 transiton-all duration-700">
        <div
          class="absolute inset-0 z-10 bg-linear-to-b from-black via-transparent to-transparent pointer-events-none"
        >
          <p id="name" class="text-5xl font-sfmono text-white text-center">Bryan Kenth Estoesta</p>
          <p
            id="info"
            class="whitespace-pre-line text-3xl text-white flex items-left justify-left pl-15"
          >
            Age: 19 Birthday: 2004-01-30
          </p>
        </div>
      </div>


    </div>
  </body>
  <script src="index.js"></script>
</html>
